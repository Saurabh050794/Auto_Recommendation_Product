<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ShopAI — Product Recommender</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:#f4f6fb; --surface:#ffffff; --surface2:#eef0f7;
--border:#d5d9e8; --accent:#6c63ff; --accent2:#ff6584;
--accent3:#16a34a; --text:#1a1a2e; --muted:#6b7280; --card:#ffffff;
}
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:var(--bg);color:var(--text);font-family:"DM Sans",sans-serif;min-height:100vh;overflow-x:hidden}
    body::before{content:"";position:fixed;inset:0;background-image:linear-gradient(rgba(108,99,255,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(108,99,255,.04) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0}
    .orb{position:fixed;border-radius:50%;filter:blur(120px);pointer-events:none;z-index:0}
    .orb1{width:600px;height:600px;background:rgba(108,99,255,.12);top:-200px;left:-200px}
    .orb2{width:500px;height:500px;background:rgba(255,101,132,.08);bottom:-150px;right:-150px}
    header{position:sticky;top:0;z-index:50;padding:16px 32px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);backdrop-filter:blur(12px);background:rgba(10,10,15,.85)}
    .logo{font-family:"Syne",sans-serif;font-size:1.5rem;font-weight:800;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .logo span{-webkit-text-fill-color:var(--accent3)}
    .hstats{display:flex;gap:20px;font-size:.78rem;color:var(--muted)}
    .hstats b{color:var(--text)}
    .hero{position:relative;z-index:5;text-align:center;padding:60px 20px 40px}
    .hero h1{font-family:"Syne",sans-serif;font-size:clamp(2rem,5vw,3.6rem);font-weight:800;line-height:1.1;margin-bottom:12px}
    .grad{background:linear-gradient(135deg,var(--accent),var(--accent2),var(--accent3));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .hero p{color:var(--muted);font-size:1rem;margin-bottom:36px}
    .search-wrap{max-width:660px;margin:0 auto 28px}
    .sbox{display:flex;background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;transition:border-color .3s,box-shadow .3s}
    .sbox:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px rgba(108,99,255,.18)}
    .sbox input{flex:1;background:none;border:none;outline:none;padding:16px 18px;color:var(--text);font-family:"DM Sans",sans-serif;font-size:1rem}
    .sbox input::placeholder{color:var(--muted)}
    .sbtn{background:linear-gradient(135deg,var(--accent),#9c94ff);border:none;padding:0 26px;color:#fff;font-family:"Syne",sans-serif;font-weight:700;font-size:.88rem;cursor:pointer;letter-spacing:.05em;transition:opacity .2s}
    .sbtn:hover{opacity:.85}
    .tabs{display:flex;justify-content:center;gap:8px;flex-wrap:wrap;margin-bottom:28px}
    .tab{padding:8px 18px;border-radius:100px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:.84rem;cursor:pointer;transition:all .2s;font-family:"DM Sans",sans-serif}
    .tab:hover{border-color:var(--accent);color:var(--accent)}
    .tab.active{background:var(--accent);border-color:var(--accent);color:#fff}
    .filters{display:flex;justify-content:center;gap:10px;flex-wrap:wrap;margin-bottom:12px;padding:0 20px;min-height:44px}
    .fg{display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:8px 14px}
    .fg label{font-size:.75rem;color:var(--muted);white-space:nowrap}
    .fg input,.fg select{background:none;border:none;outline:none;color:var(--text);font-family:"DM Sans",sans-serif;font-size:.85rem;width:90px}
    .fg select{width:130px;cursor:pointer}
    .fg select option{background:var(--surface2)}
    main{position:relative;z-index:5;max-width:1300px;margin:0 auto;padding:0 20px 80px}
    .sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
    .sec-title{font-family:"Syne",sans-serif;font-size:1.15rem;font-weight:700}
    .rcount{font-size:.78rem;color:var(--muted);background:var(--surface);padding:4px 12px;border-radius:100px;border:1px solid var(--border)}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:18px}
    .card-wrap{position:relative}
    .card{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;transition:transform .25s,border-color .25s,box-shadow .25s;cursor:pointer;animation:fadeUp .4s ease both}
    .card:hover{transform:translateY(-5px);border-color:var(--accent);box-shadow:0 12px 40px rgba(108,99,255,.18)}
    @keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
    .card-img{width:100%;height:190px;object-fit:contain;background:var(--surface2);padding:14px}
    .card-nimg{width:100%;height:190px;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:3rem}
    .card-body{padding:14px}
    .card-cat{font-size:.68rem;color:var(--accent);text-transform:uppercase;letter-spacing:.1em;margin-bottom:5px;font-weight:600}
    .card-title{font-family:"Syne",sans-serif;font-size:.88rem;font-weight:600;line-height:1.4;margin-bottom:8px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
    .card-brand{font-size:.73rem;color:var(--muted);margin-bottom:10px}
    .card-foot{display:flex;align-items:center;justify-content:space-between;padding-top:10px;border-top:1px solid var(--border)}
    .price{font-family:"Syne",sans-serif;font-size:1.05rem;font-weight:700;color:var(--accent3)}
    .orig{font-size:.72rem;color:var(--muted);text-decoration:line-through;margin-right:5px;font-family:"DM Sans",sans-serif;font-weight:400}
    .disc{background:rgba(67,233,123,.15);color:var(--accent3);font-size:.68rem;padding:2px 7px;border-radius:5px;font-weight:600}
    .stars{color:#fbbf24;letter-spacing:-2px;font-size:.85rem}
    .rev{color:var(--muted);font-size:.72rem}
    .match-badge{position:absolute;top:10px;right:10px;background:rgba(108,99,255,.92);color:#fff;font-size:.68rem;padding:3px 8px;border-radius:6px;font-weight:700}
    .loading{text-align:center;padding:80px 20px;color:var(--muted);grid-column:1/-1}
    .spinner{width:38px;height:38px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 14px}
    @keyframes spin{to{transform:rotate(360deg)}}
    .empty{text-align:center;padding:80px 20px;color:var(--muted);grid-column:1/-1}
    .empty .icon{font-size:3.5rem;margin-bottom:14px}
    .empty h3{font-family:"Syne",sans-serif;color:var(--text);margin-bottom:6px}
    .overlay{position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:100;display:none;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(6px)}
    .overlay.open{display:flex}
    .modal{background:var(--surface);border:1px solid var(--border);border-radius:18px;max-width:680px;width:100%;max-height:90vh;overflow-y:auto;animation:fadeUp .3s ease}
    .mhdr{display:flex;align-items:flex-start;gap:18px;padding:22px;border-bottom:1px solid var(--border)}
    .mimg{width:110px;height:110px;object-fit:contain;background:var(--surface2);border-radius:10px;padding:10px;flex-shrink:0}
    .minfo{flex:1}
    .minfo h2{font-family:"Syne",sans-serif;font-size:1rem;font-weight:700;margin-bottom:7px;line-height:1.4}
    .mbody{padding:22px}
    .mmeta{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px}
    .mmeta-item{background:var(--surface2);border-radius:8px;padding:10px}
    .mmeta-item label{font-size:.68rem;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;display:block;margin-bottom:3px}
    .mmeta-item span{font-weight:600;font-size:.9rem}
    .mactions{display:flex;gap:10px}
    .btn-p{flex:1;background:linear-gradient(135deg,var(--accent),#9c94ff);border:none;border-radius:9px;padding:13px;color:#fff;font-family:"Syne",sans-serif;font-weight:700;font-size:.88rem;cursor:pointer;transition:opacity .2s}
    .btn-p:hover{opacity:.85}
    .btn-s{background:var(--surface2);border:1px solid var(--border);border-radius:9px;padding:13px 18px;color:var(--text);font-family:"DM Sans",sans-serif;font-size:.88rem;cursor:pointer;transition:border-color .2s}
    .btn-s:hover{border-color:var(--accent)}
    .cbtn{background:none;border:none;color:var(--muted);font-size:1.3rem;cursor:pointer;margin-left:auto;padding:4px}
    .cbtn:hover{color:var(--text)}
    @media(max-width:600px){header{padding:12px 16px}.hstats{display:none}.grid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px}.card-img,.card-nimg{height:140px}}
  </style>
</head>
<body>
<div class="orb orb1"></div>
<div class="orb orb2"></div>

<header>
  <div class="logo">Shop<span>AI</span></div>
  <div class="hstats" id="hstats"></div>
</header>

<section class="hero">
  <h1>Find Your <span class="grad">Perfect Product</span><br/>with AI</h1>
  <p>Smart recommendations · 1000+ Amazon products · No server needed</p>
  <div class="search-wrap">
    <div class="sbox">

      <button class="sbtn" onclick="doSearch()">SEARCH</button>
    </div>
  </div>
  <div class="tabs">
    <button class="tab" onclick="switchTab('search',this)">🔍 Search</button>
    <button class="tab active" onclick="switchTab('trending',this)">🔥 Trending</button>
    <button class="tab" onclick="switchTab('category',this)">📦 Category</button>
    <button class="tab" onclick="switchTab('price',this)">💰 Price Range</button>
  </div>
  <div class="filters" id="filters"></div>
</section>

<main>
  <div class="sec-hdr">
    <h2 class="sec-title" id="secTitle">🔥 Trending Products</h2>
    <span class="rcount" id="rcount">0 products</span>
  </div>
  <div class="grid" id="grid"></div>
</main>

<div class="overlay" id="overlay" onclick="closeModal(event)">
  <div class="modal" id="modal"></div>
</div>

// Stats
const avgRating = (ALL_PRODUCTS.reduce((s,p)=>s+(p.rating||0),0)/ALL_PRODUCTS.length).toFixed(1);
const avgPrice = (ALL_PRODUCTS.filter(p=>p.final_price).reduce((s,p)=>s+(p.final_price||0),0)/ALL_PRODUCTS.filter(p=>p.final_price).length).toFixed(2);
const brands = new Set(ALL_PRODUCTS.map(p=>p.brand)).size;
document.getElementById('hstats').innerHTML = `
  <span>📦 <b>${ALL_PRODUCTS.length.toLocaleString()}</b> Products</span>
  <span>🏷️ <b>${brands}</b> Brands</span>
  <span>⭐ <b>${avgRating}</b> Avg Rating</span>
  <span>💰 Avg <b>$${avgPrice}</b></span>`;

function stars(r){const f=Math.round(r||0);return'★'.repeat(f)+'☆'.repeat(5-f)}

function renderGrid(products, title=''){
  const grid=document.getElementById('grid');
  document.getElementById('rcount').textContent=products.length+' products';
  if(title) document.getElementById('secTitle').textContent=title;
  if(!products.length){
    grid.innerHTML=`<div class="empty"><div class="icon">🔍</div><h3>No products found</h3><p>Try different search or category</p></div>`;
    return;
  }
  grid.innerHTML=products.map((p,i)=>{
    const price=p.final_price?`$${p.final_price.toFixed(2)}`:'N/A';
    const orig=p.initial_price&&p.initial_price!==p.final_price?`<span class="orig">$${p.initial_price.toFixed(2)}</span>`:'';
    const disc=p.discount&&p.discount!=='0%'&&p.discount!=='0'?`<span class="disc">${p.discount}</span>`:'';
    const cat=(p.categories||p.department||'').split(',')[0].trim().slice(0,25);
    const data=encodeURIComponent(JSON.stringify(p));
    return `<div class="card-wrap" style="animation-delay:${Math.min(i*0.04,0.5)}s">
      <div class="card" onclick="openModal('${data}')">
        ${p.image?`<img class="card-img" src="${p.image}" loading="lazy" onerror="this.outerHTML='<div class=card-nimg>🛍️</div>'"/>`:`<div class="card-nimg">🛍️</div>`}
        <div class="card-body">
          <div class="card-cat">${cat||'Product'}</div>
          <div class="card-title">${p.title}</div>
          <div class="card-brand">by ${p.brand||'Unknown'}</div>
          <div class="card-foot">
            <div class="price">${orig}${price} ${disc}</div>
            <div><span class="stars">${stars(p.rating)}</span><br/><span class="rev">(${(p.reviews||0).toLocaleString()})</span></div>
          </div>
        </div>
      </div>
    </div>`;
  }).join('');
}

function tokenize(str){return(str||'').toLowerCase().replace(/[^a-z0-9 ]/g,' ').split(/\s+/).filter(Boolean)}

function searchProducts(query,n=24){
  const tokens=tokenize(query);
  if(!tokens.length) return [];
  const scored=ALL_PRODUCTS.map(p=>{
    const txt=tokenize(p.title+' '+p.brand+' '+p.categories+' '+p.department);
    let score=0;
    tokens.forEach(t=>{
      if(txt.some(w=>w===t)) score+=3;
      else if(txt.some(w=>w.includes(t))) score+=1;
    });
    return{...p,_score:score};
  }).filter(p=>p._score>0).sort((a,b)=>b._score-a._score||b.rating-a.rating);
  return scored.slice(0,n);
}

function getTrending(n=24){
  return [...ALL_PRODUCTS].sort((a,b)=>(b.reviews||0)-(a.reviews||0)).slice(0,n);
}

function getByCategory(cat,sort='rating',n=24){
  const filtered=ALL_PRODUCTS.filter(p=>(p.categories+' '+p.department).toLowerCase().includes(cat.toLowerCase()));
  const sorted=filtered.sort((a,b)=>{
    if(sort==='rating') return (b.rating||0)-(a.rating||0);
    if(sort==='reviews') return (b.reviews||0)-(a.reviews||0);
    if(sort==='price') return (a.final_price||9999)-(b.final_price||9999);
    return 0;
  });
  return sorted.slice(0,n);
}

function getByPrice(min,max,n=24){
  return ALL_PRODUCTS.filter(p=>p.final_price&&p.final_price>=min&&p.final_price<=max)
    .sort((a,b)=>((b.rating||0)*(Math.log1p(b.reviews||0)))-((a.rating||0)*(Math.log1p(a.reviews||0))))
    .slice(0,n);
}

function getSimilar(product,n=12){
  const tokens=tokenize(product.title+' '+product.brand+' '+product.categories);
  return ALL_PRODUCTS.filter(p=>p.asin!==product.asin).map(p=>{
    const txt=tokenize(p.title+' '+p.brand+' '+p.categories);
    let score=0;
    tokens.forEach(t=>{if(txt.some(w=>w===t||w.includes(t)))score++;});
    return{...p,_score:score};
  }).filter(p=>p._score>0).sort((a,b)=>b._score-a._score).slice(0,n);
}

let currentTab='trending';

function switchTab(tab,el){
  currentTab=tab;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  const filters=document.getElementById('filters');
  const sw=document.querySelector('.search-wrap');
  if(tab==='search'){
    sw.style.display='';
    filters.innerHTML='';
    document.getElementById('secTitle').textContent='🔍 Search Results';
    document.getElementById('grid').innerHTML='';
    document.getElementById('rcount').textContent='0 products';
  } else if(tab==='trending'){
    sw.style.display='none';
    filters.innerHTML='';
    renderGrid(getTrending(),'🔥 Trending Products');
  } else if(tab==='category'){
    sw.style.display='none';
    filters.innerHTML=`
      <div class="fg"><label>Category</label>
        <select id="catSel" onchange="loadCategory()">
          <option value="Sports">Sports & Outdoors</option>
          <option value="Clothing">Clothing</option>
          <option value="Shoes">Shoes</option>
          <option value="Electronics">Electronics</option>
          <option value="Home">Home & Garden</option>
          <option value="Toys">Toys</option>
          <option value="Health">Health</option>
          <option value="Beauty">Beauty</option>
          <option value="Tools">Tools</option>
          <option value="Kitchen">Kitchen</option>
        </select>
      </div>
      <div class="fg"><label>Sort by</label>
        <select id="catSort" onchange="loadCategory()">
          <option value="rating">Rating</option>
          <option value="reviews">Reviews</option>
          <option value="price">Price</option>
        </select>
      </div>`;
    loadCategory();
  } else if(tab==='price'){
    sw.style.display='none';
    filters.innerHTML=`
      <div class="fg"><label>Min $</label><input type="number" id="minP" value="0" min="0" oninput="loadPrice()"/></div>
      <div class="fg"><label>Max $</label><input type="number" id="maxP" value="60" min="0" oninput="loadPrice()"/></div>`;
    loadPrice();
  }
}

function doSearch(){
  const q=document.getElementById('searchInput').value.trim();
  if(!q) return;
  renderGrid(searchProducts(q),`🔍 Results for "${q}"`);
}

function loadCategory(){
  const cat=document.getElementById('catSel')?.value||'Sports';
  const sort=document.getElementById('catSort')?.value||'rating';
  renderGrid(getByCategory(cat,sort),`📦 ${cat} Products`);
}

function loadPrice(){
  const min=parseFloat(document.getElementById('minP')?.value||0);
  const max=parseFloat(document.getElementById('maxP')?.value||60);
  renderGrid(getByPrice(min,max),`💰 Products $${min}–$${max}`);
}

function openModal(encoded){
  const p=JSON.parse(decodeURIComponent(encoded));
  const price=p.final_price?`$${p.final_price.toFixed(2)}`:'N/A';
  const orig=p.initial_price&&p.initial_price!==p.final_price?`<span style="text-decoration:line-through;color:var(--muted);margin-right:8px">$${p.initial_price.toFixed(2)}</span>`:'';
  document.getElementById('modal').innerHTML=`
    <div class="mhdr">
      ${p.image?`<img class="mimg" src="${p.image}" onerror="this.outerHTML='<div class=mimg style=display:flex;align-items:center;justify-content:center;font-size:2rem>🛍️</div>'"/>`:`<div class="mimg" style="display:flex;align-items:center;justify-content:center;font-size:2.5rem">🛍️</div>`}
      <div class="minfo">
        <h2>${p.title}</h2>
        <div style="color:var(--muted);font-size:.82rem;margin-bottom:8px">by <b style="color:var(--text)">${p.brand||'Unknown'}</b></div>
        <div style="font-size:1.25rem;font-weight:700;color:var(--accent3)">${orig}${price}</div>
        <div style="margin-top:8px"><span class="stars">${stars(p.rating)}</span> <span style="color:var(--muted);font-size:.8rem">${p.rating} · ${(p.reviews||0).toLocaleString()} reviews</span></div>
      </div>
      <button class="cbtn" onclick="closeModal()">✕</button>
    </div>
    <div class="mbody">
      <div class="mmeta">
        <div class="mmeta-item"><label>Department</label><span>${p.department||'N/A'}</span></div>
        <div class="mmeta-item"><label>Discount</label><span style="color:var(--accent3)">${p.discount||'None'}</span></div>
        <div class="mmeta-item"><label>Categories</label><span style="font-size:.78rem">${(p.categories||'N/A').slice(0,40)}</span></div>
        <div class="mmeta-item"><label>ASIN</label><span style="font-size:.78rem">${p.asin||'N/A'}</span></div>
      </div>
      <div class="mactions">
        ${p.url?`<button class="btn-p" onclick="window.open('${p.url}','_blank')">View on Amazon →</button>`:''}
        <button class="btn-s" onclick="showSimilar(${encodeURIComponent(JSON.stringify(p))})">Find Similar 🔮</button>
      </div>
    </div>`;
  document.getElementById('overlay').classList.add('open');
}

function showSimilar(encoded){
  closeModal();
  const p=JSON.parse(decodeURIComponent(encoded));
  const sim=getSimilar(p);
  renderGrid(sim,`🔮 Similar to "${p.title.slice(0,35)}…"`);
  window.scrollTo({top:300,behavior:'smooth'});
}

function closeModal(e){
  if(!e||e.target===document.getElementById('overlay'))
    document.getElementById('overlay').classList.remove('open');
}

document.getElementById('searchInput').addEventListener('keydown',e=>{if(e.key==='Enter')doSearch()});

// Init — load trending
renderGrid(getTrending(),'🔥 Trending Products');
</script>
